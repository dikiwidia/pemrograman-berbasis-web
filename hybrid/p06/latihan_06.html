<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex min-h-screen w-full justify-center p-12 bg-sky-50">
      <div
        class="flex flex-col w-1/3 bg-white rounded p-5 h-fit border border-sky-400"
      >
        <input
          type="text"
          placeholder="Masukkan Nama"
          class="px-2 py-1.5 outline-none border border-sky-600 w-full rounded"
        />
        <p class="font-medium mt-3">Hallo, Selamat Datang</p>
        <button
          class="px-2 py-1.5 inline-block w-fit bg-green-500 text-white rounded mt-3 hover:bg-green-600 cursor-pointer"
        >
          Submit
        </button>
      </div>
    </div>
    <script type="text/javascript">
      const inputName = document.querySelector("input");
      const welcome = document.querySelector("p");
      const submit = document.querySelector("button");

      inputName.addEventListener("input", (e) => {
        welcome.innerHTML = `Hallo, Selamat Datang ${e.target.value}`;
        if (e.target.value === "") {
          welcome.classList.add("text-red-500");
          welcome.classList.remove("text-green-500");
          submit.classList.remove("bg-green-500");
          submit.classList.add("bg-red-500");
          submit.textContent = "Tidak Bisa Submit";
        } else {
          welcome.classList.add("text-green-500");
          welcome.classList.remove("text-red-500");
          submit.classList.add("bg-green-500");
          submit.classList.remove("bg-red-500");
          submit.textContent = "Submit";
        }
      });
    </script>
  </body>
</html>
