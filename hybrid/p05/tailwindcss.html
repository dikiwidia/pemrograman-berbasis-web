<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex min-h-screen w-full p-12">
      <div
        class="flex flex-col w-1/6 bg-white rounded h-fit border border-gray-200"
      >
        <img
          src="https://picsum.photos/200/100"
          class="w-full h-30 object-cover rounded-t"
          alt=""
        />
        <div class="flex flex-col w-full p-5 gap-3">
          <h3 class="text-xl font-medium">Card title</h3>
          <p>
            Some quick example text to build on the card title and make up the
            bulk of the card’s content.
          </p>
          <a
            href="#"
            class="bg-green-600 py-1.5 rounded px-2 text-white w-fit hover:bg-green-700"
            >Go somewhere</a
          >
        </div>
      </div>
    </div>
  </body>
</html>
